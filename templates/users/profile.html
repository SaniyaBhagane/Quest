{% extends "layout.html" %}
{% block title %}Profile · Quest{% endblock %}

{% block content %}

<style>
/* PROFILE CARD */
.profile-card {
    max-width: 520px;
    margin: 0 auto;
    background: linear-gradient(180deg, #0b1220, #020617);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.65);
    animation: fadeUp 0.6s ease;
}

/* Avatar */
.profile-avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 18px;
    background: linear-gradient(135deg, var(--primary), var(--primary-hover));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    color: white;
    box-shadow: 0 12px 30px rgba(99,102,241,0.45);
}

/* Username */
.profile-card h2 {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 700;
}

/* Meta info */
.profile-meta {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 6px;
}

/* Divider */
.profile-divider {
    height: 1px;
    background: var(--border);
    margin: 26px 0;
}

/* Bio */
.profile-bio {
    color: #d1d5db;
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 30px;
}

/* Actions */
.profile-actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
}

.profile-actions a {
    padding: 12px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
}

/* Primary */
.profile-actions .primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-hover));
    color: white;
    box-shadow: 0 12px 30px rgba(99,102,241,0.35);
}

.profile-actions .primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 45px rgba(99,102,241,0.45);
}

/* Outline */
.profile-actions .outline {
    border: 1px solid var(--border);
    color: var(--text);
}

.profile-actions .outline:hover {
    background: rgba(255,255,255,0.04);
}

/* Fade animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(18px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

<div class="profile-card">

    <!-- AVATAR -->
    <div class="profile-avatar">
        {{ user.username|first|upper }}
    </div>

    <!-- NAME -->
    <h2>{{ user.username }}</h2>

    <!-- META -->
    <div class="profile-meta">
        {{ profile.department }} · Year {{ profile.year }}
    </div>

    <div class="profile-divider"></div>

    <!-- BIO -->
    <div class="profile-bio">
        {{ profile.bio|default:"No bio added yet." }}
    </div>

    <!-- ACTIONS -->
    <div class="profile-actions">
        <a href="{% url 'communities:list' %}" class="primary">
            Explore Communities
        </a>
        <a href="{% url 'home' %}" class="outline">
            Back to Home
        </a>
    </div>

</div>

{% endblock %}
